release-gitops-prod:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/Compas-gitops-production.git"
    BRANCH: "main"
    PATH_TO_VALUE: "apps/compas-ui/values.yaml"
    KEY_TO_CHANGE: "ui-compas.image.tag"
    NEW_VALUE: "$CI_COMMIT_TAG"
    USERNAME: "${GITOPS_USERNAME_PROD}"
    PASSWORD_VAR: "${GITOP_TOKEN_PROD_TAG}"
    AUTOMERGE: "true"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual