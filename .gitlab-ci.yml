include:
  - component: $CI_SERVER_FQDN/sndi-lille/ressources-communes/components/meta-component-js-kube/ci-js-kube@1.0.0
    inputs:
      package_manager: "npm" 
      sonar_project_key: "dsi_compas_compas-ui-v2_3395f55b-6671-4c39-9a53-6585284c1b56"
      sonar_token: "${SONAR_TOKEN}"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

cypress-tests:
  image: cypress/browsers:22.15.0
  stage: build-app-and-test
  script:
    - npm ci
    - npm run dev &
    - npx wait-on http://localhost:5173
    - npx cypress run --browser electron