include:
  - component: $CI_SERVER_FQDN/sndi-lille/ressources-communes/components/meta-component-js-kube/ci-js-kube@2.0.0-rc
    inputs:
      package_manager: "pnpm" 
      sonar_project_key: "dsi_compas_compas-ui-v2_3395f55b-6671-4c39-9a53-6585284c1b56"
      sonar_token: "${SONAR_TOKEN}"
      auto_tags_with_semver: false
  - project: 'kubernetes/kubeapp/ci-templates'
    ref: main
    file:
      - '/utils.yaml'
  - component: $CI_SERVER_FQDN/outils-transverses/services-transverses/mirroring-component/mirroring-pipeline@0.0.2
    inputs:
      project_id_gitlab: ${CI_PROJECT_ID}
      personnal_token_gitlab: ${GITHUB_MR_TOKEN}
      project_github_name: "Compas-IHM"
      username_personnal_github: ${GITHUB_MIRROR_USERNAME}
      personnal_token_github: ${GITHUB_TOKEN_MIRRORING}
      chemin_gitlab_project: "dsi/compas/compas-ui-v2"




stages:
  - check-source-branch
  - security-app
  - build-app-and-test
  - quality
  - 🪞mirroir mon beau mirroir
  - calculate-version-and-release
  - tag
  - docker
  - release-gitops


    

release-gitops-dev1:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/CompasGitops.git"
    BRANCH: "master"
    PATH_TO_VALUE: "apps/compas-ui-dev1/values.yaml"
    KEY_TO_CHANGE: "ui-compas.image.tag"
    NEW_VALUE: "$CI_COMMIT_REF_NAME"
    USERNAME: "${GITOPS_USERNAME}"
    PASSWORD_VAR: "${GITOPS_TOKEN}"
    AUTOMERGE: "true"

  rules:
    - when: manual

