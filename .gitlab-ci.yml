include:
  - component: $CI_SERVER_FQDN/sndi-lille/ressources-communes/components/meta-component-js-kube/ci-js-kube@2.0.0-rc
    inputs:
      package_manager: "pnpm" 
      sonar_project_key: "dsi_compas_compas-ui-v2_3395f55b-6671-4c39-9a53-6585284c1b56"
      sonar_token: "${SONAR_TOKEN}"
      auto_tags_with_semver: false
  - project: 'kubernetes/kubeapp/ci-templates'
    ref: main
    file:
      - '/utils.yaml'


stages:
  - check-source-branch
  - security-app
  - build-app-and-test
  - quality
  - mirroring
  - calculate-version-and-release
  - tag
  - docker
  - release-gitops


sync-from-github:
  stage: mirroring
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache curl jq
    - |
      GH_PRS=$(curl --silent \
        --header "Authorization: Bearer ${GITHUB_TOKEN_MIRRORING}" \
        --header "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/InseeFr/Compas-IHM/pulls?state=open")
      echo "PRs GitHub trouvées : $(echo "$GH_PRS" | jq 'length')"

      echo "$GH_PRS" | jq -c '.[]' | while read -r PR; do
        PR_NUMBER=$(echo "$PR" | jq -r '.number')
        PR_TITLE=$(echo "$PR"  | jq -r '.title')
        PR_BODY=$(echo "$PR"   | jq -r '.body // ""')
        PR_BRANCH=$(echo "$PR" | jq -r '.head.ref')

        echo "--- Traitement PR #${PR_NUMBER} : ${PR_TITLE} (branche: ${PR_BRANCH})"

        git fetch https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-IHM.git "${PR_BRANCH}" || {
          echo "⚠️  Impossible de fetch la branche ${PR_BRANCH}, on passe."
          continue
        }
        git push https://oauth2:${GITHUB_MR_TOKEN}@gitlab.insee.fr/dsi/compas/compas-ui-v2.git "FETCH_HEAD:refs/heads/${PR_BRANCH}" || {
          echo "⚠️  Push de ${PR_BRANCH} échoué, on passe."
          continue
        }

        CREATE_RESPONSE=$(jq -n \
          --arg source "${PR_BRANCH}" \
          --arg target "main" \
          --arg title  "[GitHub IHM PR #${PR_NUMBER}] ${PR_TITLE}" \
          --arg desc   "${PR_BODY}" \
          '{source_branch: $source, target_branch: $target, title: $title, description: $desc, remove_source_branch: false}' \
          | curl --silent --request POST \
              --header "PRIVATE-TOKEN: ${GITHUB_MR_TOKEN}" \
              --header "Content-Type: application/json" \
              --data @- \
              "https://gitlab.insee.fr/api/v4/projects/${CI_PROJECT_ID}/merge_requests")

        echo "Réponse GitLab : $CREATE_RESPONSE"

        MR_IID=$(echo "$CREATE_RESPONSE" | jq '.iid // null')
        if [ "$MR_IID" != "null" ]; then
          echo "MR créée #${MR_IID} ✅"
        else
          echo "MR déjà existante ou erreur : $(echo "$CREATE_RESPONSE" | jq -r '.message // "inconnue"')"
        fi
      done
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

mirror-ihm-to-github:
  stage: mirroring
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
  variables:
    GIT_DEPTH: 0

  script: 
    - git remote add github_compas_ihm https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-IHM.git
    - git push github_compas_ihm HEAD:main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    

release-gitops-dev1:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/CompasGitops.git"
    BRANCH: "master"
    PATH_TO_VALUE: "apps/compas-ui-dev1/values.yaml"
    KEY_TO_CHANGE: "ui-compas.image.tag"
    NEW_VALUE: "$CI_COMMIT_REF_NAME"
    USERNAME: "${GITOPS_USERNAME}"
    PASSWORD_VAR: "${GITOPS_TOKEN}"
    AUTOMERGE: "true"

  rules:
    - when: manual

